name: CI Pipeline

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'pr-driven-pipeline/**'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v5

      - name: Run CI pipeline
        run: |
          chmod +x pr-driven-pipeline/ci_shim.sh
          cd pr-driven-pipeline
          ./ci_shim.sh
